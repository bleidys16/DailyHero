name: dailyhero
description: "RPG habit tracker para móviles."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  riverpod_generator: ^2.3.0

  # Supabase
  supabase_flutter: ^1.10.0

  # UI & Animaciones
  smooth_page_indicator: ^1.1.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.2.0

  # Utilidades
  intl: ^0.19.0
  uuid: ^4.0.0
  go_router: ^13.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sprites/
    - assets/icons/
